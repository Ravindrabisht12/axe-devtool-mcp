name: Publish to npm

# Publishes when you push a version tag like v0.4.0, or run it manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC Trusted Publishing (no token needed)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) requires a recent npm CLI.
      - name: Upgrade npm
        run: npm install -g npm@latest

      # Skip lifecycle scripts so the heavy Playwright browser download
      # doesn't run on the publish runner; we build explicitly below.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      # No NODE_AUTH_TOKEN: OIDC + the npm Trusted Publisher config authenticates.
      # --provenance attaches a verifiable build attestation.
      - name: Publish
        run: npm publish --provenance --access public
